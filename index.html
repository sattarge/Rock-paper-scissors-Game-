<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="container">
    <header>
      <h1>✊ Rock Paper Scissors ✂️</h1>
      <p>Computer se muqabla karein — apna haath chuniye!</p>
    </header>

    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="score-card player">
        <div class="label">Aap</div>
        <div class="num" id="p-score">0</div>
      </div>
      <div class="score-divider">SCORE</div>
      <div class="score-card computer">
        <div class="label">Computer</div>
        <div class="num" id="c-score">0</div>
      </div>
    </div>

    <!-- Arena -->
    <div class="arena">
      <div class="arena-side">
        <div class="arena-label">Aap</div>
        <div class="choice-box" id="p-box">🤔</div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="arena-side">
        <div class="arena-label">Computer</div>
        <div class="choice-box" id="c-box">🤖</div>
      </div>
    </div>

    <!-- Result -->
    <div class="result-area">
      <div class="result-msg" id="result-msg">Koi bhi haath chuniye shuru karne ke liye!</div>
    </div>

    <!-- Choice buttons -->
    <div class="choices">
      <button class="choice-btn" id="btn-rock" onclick="play('rock')" aria-label="Rock">
        <span class="emoji">✊</span>
        <span class="name">Pathar</span>
      </button>
      <button class="choice-btn" id="btn-paper" onclick="play('paper')" aria-label="Paper">
        <span class="emoji">✋</span>
        <span class="name">Kagaz</span>
      </button>
      <button class="choice-btn" id="btn-scissors" onclick="play('scissors')" aria-label="Scissors">
        <span class="emoji">✌️</span>
        <span class="name">Qainchi</span>
      </button>
    </div>

    <button class="reset-btn" onclick="resetGame()">🔄 Reset Karein</button>

    <!-- History -->
    <div class="history" id="history">
      <div class="history-label">Round History</div>
      <div class="history-dots" id="history-dots"></div>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
